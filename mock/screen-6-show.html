<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================ */
/* 画面 6：展会 ================================ */
/* ============================================ */
.s6-show-card{
  margin:14px;
  background:linear-gradient(135deg,#1a1410 0%,var(--bg-card) 100%);
  border:1px solid var(--gold-dim);
  border-radius:12px;
  padding:16px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 20px rgba(201,168,90,0.08);
}
.s6-show-card::before{
  content:'';
  position:absolute;
  top:-50%;right:-30%;
  width:160px;height:160px;
  background:radial-gradient(circle,var(--gold-glow) 0%,transparent 60%);
}
.s6-show-name{
  font-family:'Noto Serif SC',serif;
  font-size:18px;
  color:var(--gold-light);
  margin-bottom:6px;
  position:relative;
}
.s6-show-date{
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text-muted);
  margin-bottom:14px;
  position:relative;
}
.s6-show-date .live{
  display:inline-block;
  margin-left:6px;
  padding:2px 8px;
  background:var(--rose);
  color:#fff;
  border-radius:10px;
  font-size:9px;
  letter-spacing:1px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.s6-show-stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  position:relative;
}
.s6-show-stat{
  text-align:center;
  padding:8px 4px;
  background:rgba(10,10,10,0.5);
  border-radius:6px;
}
.s6-show-stat-v{font-family:'DM Mono',monospace;font-size:18px;color:var(--gold);font-weight:500;}
.s6-show-stat-l{font-size:9px;color:var(--text-dim);margin-top:2px;letter-spacing:0.5px;}

.s6-list{margin:0 14px;}
.s6-item{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
}
.s6-item-thumb{
  width:50px;height:50px;
  border-radius:6px;
  background:linear-gradient(135deg,#1a1410,#0a0a0a);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.s6-item-info{flex:1;min-width:0;}
.s6-item-name{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);}
.s6-item-qty{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-dim);
  margin-top:3px;
}
.s6-item-qty .sold{color:var(--rose);}
.s6-item-qty .left{color:var(--jade);}
.s6-item-actions{display:flex;gap:4px;flex-shrink:0;}
.s6-item-btn{
  padding:6px 10px;
  font-size:11px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg-overlay);
  color:var(--text-muted);
  cursor:pointer;
}
.s6-item-btn.sell{color:var(--rose);border-color:var(--rose);}
.s6-item-btn.ret{color:var(--jade);border-color:var(--jade);}

.s6-finish{margin:20px 14px;}
.s6-finish .btn{
  width:100%;
  height:54px;
  font-size:15px;
  letter-spacing:2px;
}
.s6-item-btn{text-decoration:none;}
.s6-item-btn:hover{filter:brightness(1.2);}
</style>
</head>
