<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>矿珍库 · 扫码识别</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<script src="common.js" defer></script>
<style>
/* ============================================ */
/* 画面 5：扫码识别 ============================ */
/* ============================================ */
.s5-scan-frame{
  margin:24px 14px;
  aspect-ratio:1/1;
  background:#000;
  border:1px solid var(--gold-dim);
  border-radius:12px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.s5-scan-corners::before,.s5-scan-corners::after,
.s5-scan-corners > div::before,.s5-scan-corners > div::after{
  content:'';
  position:absolute;
  width:30px;height:30px;
  border:2px solid var(--gold);
}
.s5-scan-corners::before{top:14px;left:14px;border-right:none;border-bottom:none;}
.s5-scan-corners::after{top:14px;right:14px;border-left:none;border-bottom:none;}
.s5-scan-corners > div::before{bottom:14px;left:14px;border-right:none;border-top:none;}
.s5-scan-corners > div::after{bottom:14px;right:14px;border-left:none;border-top:none;}
.s5-scan-line{
  position:absolute;
  left:14px;right:14px;
  height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%);
  box-shadow:0 0 16px var(--gold);
  top:50%;
  animation:scan 2.5s ease-in-out infinite;
}
@keyframes scan{
  0%,100%{top:14%;}
  50%{top:86%;}
}
.s5-scan-hint{
  position:relative;
  z-index:2;
  text-align:center;
  color:var(--text-muted);
  font-size:12px;
}
.s5-scan-hint svg{margin-bottom:8px;opacity:0.4;}

.s5-actions{
  display:flex;
  gap:10px;
  margin:0 14px 14px;
}
.s5-action{
  flex:1;
  padding:16px 10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  color:var(--text);
  transition:all 0.2s ease;
}
.s5-action:hover{border-color:var(--gold-dim);}
.s5-action.primary{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dim) 100%);
  border-color:var(--gold);
  color:#1a1410;
}
.s5-action-icon{font-size:22px;display:block;margin-bottom:6px;}
.s5-action-text{font-size:12px;font-weight:500;}

.s5-result{
  margin:0 14px 14px;
  padding:12px 14px;
  background:rgba(122,179,138,0.08);
  border:1px solid var(--jade);
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
}
.s5-result-icon{
  width:28px;height:28px;
  border-radius:50%;
  background:var(--jade);
  color:#0a1a10;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  flex-shrink:0;
  font-weight:700;
}
.s5-result-text{flex:1;}
.s5-result-title{font-size:13px;color:var(--text);}
.s5-result-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px;}

.s5-candidates{margin:0 14px;}
.s5-cand{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  display:flex;
  gap:10px;
  align-items:center;
}
.s5-cand-thumb{
  width:54px;height:54px;
  border-radius:6px;
  background:linear-gradient(135deg,#1a1410,#0a0a0a);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  position:relative;
}
.s5-cand-match{
  position:absolute;
  top:-4px;right:-4px;
  background:var(--gold);
  color:#1a1410;
  font-size:9px;
  padding:1px 5px;
  border-radius:8px;
  font-family:'DM Mono',monospace;
  font-weight:700;
}
.s5-cand-info{flex:1;min-width:0;}
.s5-cand-name{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);}
.s5-cand-meta{font-size:10px;color:var(--text-dim);margin-top:2px;}
.s5-cand-actions{display:flex;gap:4px;flex-shrink:0;}
.s5-cand-btn{
  width:32px;height:32px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg-overlay);
  color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:14px;
}
.s5-cand-btn{text-decoration:none;}
.s5-cand-btn.in{color:var(--jade);border-color:var(--jade);}
.s5-cand-btn.out{color:var(--rose);border-color:var(--rose);}
.s5-cand-btn.det{color:var(--gold);border-color:var(--gold-dim);}
.s5-cand-btn:hover{filter:brightness(1.2);}

.s5-advanced{
  margin:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}
.s5-adv-head{
  padding:10px 14px;
  font-size:12px;
  color:var(--text-muted);
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}
.s5-adv-head .arrow{
  color:var(--text-dim);
  transition:transform 0.2s ease;
}
</style>
</head>
<body>

    </div>
  </div>
  <div class="s1-row2">

    <div class="s1-cur-chip" onclick="cycleCur()" title="切换币种 JPY/CNY/USD/EUR">¥ JPY</div>
    <div class="s1-stats-trigger" onclick="document.getElementById('appDropdown').style.display=document.getElementById('appDropdown').style.display==='block'?'none':'block'">

      概览

    </div>
    <div class="s1-stats-dropdown" id="appDropdown" style="display:none;">

</div>
<div class="stage">

    <a class="icon-btn" href="screen-2-inventory.html" title="返回库存"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>

  <div class="s5-candidates">

        <span class="s5-cand-match">95%</span>
        <svg width="40" height="40" viewBox="0 0 100 100"><defs><radialGradient id="s5m1" cx="35%" cy="30%"><stop offset="0%" stop-color="#5a5048"/><stop offset="100%" stop-color="#0f0d0a"/></radialGradient></defs><ellipse cx="50" cy="55" rx="38" ry="32" fill="url(#s5m1)"/></svg>

    </div>

      <div class="s5-cand-thumb">

</div></div></div>
<script>
function s5SetSrc(el){
  document.querySelectorAll('.s5-action').forEach(a=>a.classList.remove('primary'));
  el.classList.add('primary');
}
</script>
</body></html>
